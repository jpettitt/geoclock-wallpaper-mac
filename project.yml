# XcodeGen project definition for GeoClockWallpaper. Run
# `xcodegen generate` to regenerate the .xcodeproj from this file.
# The generated project is gitignored — this YAML is the source of
# truth for everything Xcode would otherwise keep in opaque XML.

name: GeoClockWallpaper
options:
  bundleIdPrefix: world.geoclock
  deploymentTarget:
    macOS: '13.0'  # WKWebView snapshot APIs we use are 13+ stable
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    # SwiftUI lifecycle + concurrency
    SWIFT_VERSION: '5.10'
    MACOSX_DEPLOYMENT_TARGET: '13.0'
    # Code signing — set automatically for local dev; for release
    # builds you'll set DEVELOPMENT_TEAM via xcconfig or in Xcode.
    CODE_SIGN_STYLE: Automatic
    # No Mac Catalyst, this is macOS-native.
    SUPPORTS_MACCATALYST: NO
    # SwiftUI previews work in 14+ but we set the bar at 13.
    ENABLE_PREVIEWS: YES

targets:
  GeoClockWallpaper:
    type: application
    platform: macOS
    sources:
      - path: GeoClockWallpaper
        excludes:
          - Info.plist  # referenced via INFOPLIST_FILE, not as a source
      - path: WebAssets
        # Folder reference — XcodeGen ships the whole directory
        # verbatim as Contents/Resources/WebAssets/. The
        # BundledAssetHandler maps geoclock-app:// URLs to files
        # in here. Synced from the card repo by
        # scripts/sync-web-assets.sh; never edited by hand.
        type: folder
        buildPhase: resources
    info:
      path: GeoClockWallpaper/Info.plist
      # XcodeGen merges these into the Info.plist on top of the file
      # contents. Keeping them here means the values that matter for
      # SwiftUI / menu-bar behavior live next to the rest of the
      # project config, not in opaque plist XML.
      properties:
        LSUIElement: true   # menu-bar only, no Dock icon
        LSApplicationCategoryType: public.app-category.utilities
        NSHumanReadableCopyright: 'GPL-3.0-or-later © 2026 John Pettitt'
        # User-visible explanation Apple shows in the location-
        # access prompt. We only ask when the user picks
        # "My location" in Settings.
        NSLocationUsageDescription: >-
          Used to center the live wallpaper map on your current
          location. If you decline, the map falls back to your
          time zone's centroid instead.
        # No transit declaration since the only network use is
        # loading https://geoclock.world (TLS, public).
    entitlements:
      path: GeoClockWallpaper/GeoClockWallpaper.entitlements
      properties:
        com.apple.security.app-sandbox: true
        # Core Location access — needed in addition to the
        # Info.plist usage description on sandboxed Mac apps.
        # The user still has to grant permission in the prompt.
        com.apple.security.personal-information.location: true
        # Outbound network only — we hit geoclock.world / R2.
        com.apple.security.network.client: true
        # Read-write into ~/Library/Application Support/<bundle>
        # is granted by default in the sandbox; no entitlement
        # needed. setDesktopImageURL works inside the sandbox.
        # Reading the user's bookmark of the Pictures folder would
        # need an entitlement, but we never touch it.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: world.geoclock.wallpaper
        PRODUCT_NAME: GeoClockWallpaper
        MARKETING_VERSION: '0.1.0-alpha'
        CURRENT_PROJECT_VERSION: '1'
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_HARDENED_RUNTIME: YES
        GENERATE_INFOPLIST_FILE: NO  # we supply our own

  # XCTest target for the pure-logic parts of the app —
  # projection math, sun astronomical formulas, the
  # WallpaperConfig Codable migrations and per-display
  # `resolved(forDisplay:)` override folding. We don't (yet)
  # test the AppKit/Combine/WKWebView surfaces; those need
  # ui-test infrastructure that's a bigger lift.
  GeoClockWallpaperTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: GeoClockWallpaperTests
    dependencies:
      - target: GeoClockWallpaper
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: world.geoclock.wallpaper.tests
        PRODUCT_NAME: GeoClockWallpaperTests
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/GeoClockWallpaper.app/Contents/MacOS/GeoClockWallpaper
        GENERATE_INFOPLIST_FILE: YES

schemes:
  GeoClockWallpaper:
    build:
      targets:
        GeoClockWallpaper: all
        GeoClockWallpaperTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - GeoClockWallpaperTests
    archive:
      config: Release
